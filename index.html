<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pokédex</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        <link rel="preconnect" href="https://fonts.gstatic.com">
        <link href="https://fonts.googleapis.com/css2?family=PT+Sans+Narrow:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/styles.css">
    </head>

    <body>

        <header>
            <a href=""><img src="https://www.cdnlogo.com/logos/p/81/pokemon.svg" id="pokemon-logo"></a>
        </header>

        <main>
            <div class="container rounded">
                <ul id="contenedor-pokemones"></ul>
            </div>

            <div class="modal oculto">
                <span class="close">&times;</span>
                <div class="row">
                    <div id="info-pokemon">
                        <svg class="icono" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-info-square" viewBox="0 0 16 16">
                            <path d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2z"/>
                            <path d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533zM9 4.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0"/>
                        </svg>
                        <h4 id="detalles">| Detalles</h4>
                        <div>
                        <hr>
                            <p>Nombre: </p> <em id="nombre-pokemon"></em>
                        </div>
                        <div>
                            <p>Altura: </p> <em id="altura-pokemon"></em>
                        </div>
                        <div>
                            <p>Peso: </p> <em id="peso-pokemon"></em>
                        </div>
                        <div>
                            <p>Experiencia: </p> <em id="experiencia-pokemon"></em>
                        </div>
                        <hr>
                    </div>
                </div>
                <div class="row">
                    <div class="loader"></div>
                    <div id="contenedor-img"></div>
                </div>
            </div>

            <div class="toolbar">
                <button id="boton-atras">&laquo;</button>
                <button id="contador-pagina"><p id="pagina-actual">1</p> de <p id="pagina-final"></p></button>
                <button id="boton-siguiente">&raquo;</button>
            </div>

        </main>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
        <script src="src/index.js" type="module"></script>
    </body>
</html>
